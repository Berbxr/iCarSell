services:
  db:
    image: postgres:16
    container_name: icarsell-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5437:5432"
    volumes:
      - icarsell-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: icarsell-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      ADMIN_PASSWORD_INICIAL: ${ADMIN_PASSWORD_INICIAL}
      PORT: "4000"
      TZ: ${TZ:-America/Tijuana}
    volumes:
      - icarsell-uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: icarsell-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8082}:80"
    depends_on:
      - backend

volumes:
  icarsell-pgdata:
  icarsell-uploads:
